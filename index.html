<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIY VR Physics Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Cannon.js for Bonelab-style Physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    
    <!-- Firebase for Multi-Device connection -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment setup
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCN9lkBMMTaEk8FR4TKgBqcvDkVFtnDUrk",
            authDomain: "weblox-1f8b0.firebaseapp.com",
            projectId: "weblox-1f8b0",
            storageBucket: "weblox-1f8b0.firebasestorage.app",
            messagingSenderId: "765567900101",
            appId: "1:765567900101:web:fa03494970c3019f1e93ac",
            measurementId: "G-D7E2MT985J"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'diy-vr-sandbox-html';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State
        let user = null;
        let roomCode = "";
        let currentRole = ""; 
        let lastSyncTime = 0;
        const SYNC_INTERVAL = 50; 

        // 3D & Physics
        let scene, camera, renderer, world;
        let physicsBodies = [];
        let renderMeshes = [];
        
        // Player Rig
        let playerBody;
        let leftHandBody, rightHandBody;
        let leftHandMesh, rightHandMesh;
        const moveSpeed = 5;
        const input = { w: false, a: false, s: false, d: false, space: false };

        // UI
        const menuUI = document.getElementById('menu-ui');
        const hostUI = document.getElementById('host-ui');
        const clientUI = document.getElementById('client-ui');

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth failed:", e);
                document.getElementById('status-text').innerText = "Network Error.";
            }
        }

        onAuthStateChanged(auth, (u) => {
            user = u;
            if(user) {
                document.querySelectorAll('.role-btn').forEach(btn => btn.disabled = false);
                document.getElementById('status-text').innerText = "Connected. Select a role.";
            }
        });

        initAuth();

        // --- CONTROLS ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key in input) input[key] = true;
            if (key === ' ') input.space = true;
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in input) input[key] = false;
            if (key === ' ') input.space = false;
        });

        // --- HOST LOGIC ---
        async function startHost() {
            if (!user) return;
            menuUI.classList.add('hidden');
            hostUI.classList.remove('hidden');
            document.getElementById('display-code').innerText = roomCode;

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'vrsessions', roomCode);
            
            await setDoc(roomRef, {
                hostId: user.uid,
                headset: { x: 0, y: 0, z: 0, w: 1 },
                left: { x: 0, y: 0, z: 0, w: 1 },
                right: { x: 0, y: 0, z: 0, w: 1 }
            });

            init3D();

            onSnapshot(roomRef, (docSnap) => {
                if (!docSnap.exists() || !camera) return;
                const data = docSnap.data();

                if (data.headset) {
                    camera.quaternion.set(data.headset.x, data.headset.y, data.headset.z, data.headset.w);
                }
                if (data.left && leftHandBody) {
                    leftHandBody.quaternion.set(data.left.x, data.left.y, data.left.z, data.left.w);
                }
                if (data.right && rightHandBody) {
                    rightHandBody.quaternion.set(data.right.x, data.right.y, data.right.z, data.right.w);
                }
            }, (err) => console.error("Snapshot error:", err));
        }

        // --- CLIENT LOGIC ---
        async function startClientDevice() {
            if (!user) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'vrsessions', roomCode);
            const snap = await getDoc(roomRef);
            if (!snap.exists()) { alert("Room not found!"); return; }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try { await DeviceOrientationEvent.requestPermission(); } catch (e) { console.error(e); }
            }

            menuUI.classList.add('hidden');
            clientUI.classList.remove('hidden');
            document.getElementById('client-role-display').innerText = `Active: ${currentRole.toUpperCase()}`;

            const euler = new THREE.Euler(0,0,0, 'YXZ');
            const quaternion = new THREE.Quaternion();

            window.addEventListener('deviceorientation', (event) => {
                const now = Date.now();
                if (now - lastSyncTime < SYNC_INTERVAL) return;
                
                let alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0;
                let beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;
                let gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0;

                euler.set(beta, alpha, -gamma, 'YXZ');
                quaternion.setFromEuler(euler);

                const updatePayload = {};
                updatePayload[currentRole] = { x: quaternion.x, y: quaternion.y, z: quaternion.z, w: quaternion.w };
                setDoc(roomRef, updatePayload, { merge: true });
                lastSyncTime = now;
            });
        }

        // --- 3D & PHYSICS ---
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            scene.fog = new THREE.Fog(0x111111, 0, 60);
            
            const grid = new THREE.GridHelper(100, 100, 0x444444, 0x222222);
            scene.add(grid);

            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x505050));

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            world = new CANNON.World();
            world.gravity.set(0, -18, 0); 
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 25;

            const groundBody = new CANNON.Body({ 
                mass: 0, 
                shape: new CANNON.Plane(),
                material: new CANNON.Material({ friction: 0.5 }) 
            });
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            const playerShape = new CANNON.Sphere(0.4);
            playerBody = new CANNON.Body({ mass: 80, shape: playerShape, fixedRotation: true });
            playerBody.position.set(0, 1, 0);
            playerBody.linearDamping = 0.95;
            world.addBody(playerBody);

            // Spawning Box Tower
            for(let i=0; i<40; i++) {
                spawnBox(Math.random()*4-2, 1+i*0.6, -5);
            }

            // --- WEAPONS ---
            spawnWeapon("Crowbar", -2, 1, -3);
            spawnWeapon("Lead Pipe", 2, 1, -3);
            spawnWeapon("Heavy Block", 0, 1, -2);

            const handShape = new CANNON.Box(new CANNON.Vec3(0.08, 0.08, 0.08));
            leftHandBody = new CANNON.Body({ mass: 5, shape: handShape, collisionFilterGroup: 2 });
            rightHandBody = new CANNON.Body({ mass: 5, shape: handShape, collisionFilterGroup: 2 });
            world.addBody(leftHandBody);
            world.addBody(rightHandBody);

            leftHandMesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.2), new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x440000 }));
            rightHandMesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.2), new THREE.MeshStandardMaterial({ color: 0x3333ff, emissive: 0x000044 }));
            scene.add(leftHandMesh);
            scene.add(rightHandMesh);

            animate();
        }

        function spawnBox(x, y, z) {
            const size = 0.5;
            const body = new CANNON.Body({ 
                mass: 10, 
                shape: new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2)),
                material: new CANNON.Material({ friction: 0.3 })
            });
            body.position.set(x, y, z);
            world.addBody(body);
            physicsBodies.push(body);

            const mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), new THREE.MeshStandardMaterial({ color: 0x888888 }));
            scene.add(mesh);
            renderMeshes.push(mesh);
        }

        function spawnWeapon(type, x, y, z) {
            let body, mesh;
            if(type === "Crowbar") {
                const shape = new CANNON.Box(new CANNON.Vec3(0.03, 0.03, 0.6));
                body = new CANNON.Body({ mass: 15, shape: shape });
                mesh = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 1.2), new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.8, roughness: 0.2 }));
            } else if(type === "Lead Pipe") {
                const shape = new CANNON.Cylinder(0.05, 0.05, 1.5, 8);
                body = new CANNON.Body({ mass: 20, shape: shape });
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8), new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9 }));
            } else {
                const shape = new CANNON.Box(new CANNON.Vec3(0.3, 0.3, 0.3));
                body = new CANNON.Body({ mass: 50, shape: shape });
                mesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({ color: 0x444444 }));
            }
            
            body.position.set(x, y, z);
            world.addBody(body);
            physicsBodies.push(body);
            scene.add(mesh);
            renderMeshes.push(mesh);
        }

        const velocity = new CANNON.Vec3();
        function animate() {
            requestAnimationFrame(animate);

            if (!playerBody || !camera) return;

            // Player Movement
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0; right.normalize();

            velocity.set(0, 0, 0);
            if (input.w) velocity.vadd(forward.multiplyScalar(moveSpeed), velocity);
            if (input.s) velocity.vsub(forward.multiplyScalar(moveSpeed), velocity);
            if (input.a) velocity.vsub(right.multiplyScalar(moveSpeed), velocity);
            if (input.d) velocity.vadd(right.multiplyScalar(moveSpeed), velocity);
            
            playerBody.position.x += velocity.x * (1/60);
            playerBody.position.z += velocity.z * (1/60);
            
            if (input.space && Math.abs(playerBody.velocity.y) < 0.1) {
                playerBody.velocity.y = 8;
            }

            camera.position.copy(playerBody.position);
            camera.position.y += 0.8; 

            // Hand Physics Targets
            const lPos = new THREE.Vector3(-0.4, -0.3, -0.6).applyQuaternion(camera.quaternion).add(camera.position);
            const rPos = new THREE.Vector3(0.4, -0.3, -0.6).applyQuaternion(camera.quaternion).add(camera.position);
            
            // P-Controller for Hands (Bonelab handles hands as physical objects)
            const strength = 0.15;
            leftHandBody.position.lerp(lPos, strength, leftHandBody.position);
            rightHandBody.position.lerp(rPos, strength, rightHandBody.position);

            world.step(1/60);

            // Sync Visuals
            for(let i=0; i<physicsBodies.length; i++) {
                renderMeshes[i].position.copy(physicsBodies[i].position);
                renderMeshes[i].quaternion.copy(physicsBodies[i].quaternion);
            }
            leftHandMesh.position.copy(leftHandBody.position);
            leftHandMesh.quaternion.copy(leftHandBody.quaternion);
            rightHandMesh.position.copy(rightHandBody.position);
            rightHandMesh.quaternion.copy(rightHandBody.quaternion);

            renderer.render(scene, camera);
        }

        // --- UI BUTTON LISTENERS ---
        document.getElementById('btn-host').addEventListener('click', () => {
            currentRole = 'host';
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            startHost();
        });

        const joinWithRole = (role) => {
            const codeInput = document.getElementById('room-input');
            roomCode = codeInput.value;
            if(roomCode.length === 4) {
                currentRole = role;
                startClientDevice();
            } else {
                alert("Enter the 4-digit code shown on the Host PC.");
            }
        };

        document.getElementById('btn-headset').addEventListener('click', () => joinWithRole('headset'));
        document.getElementById('btn-left').addEventListener('click', () => joinWithRole('left'));
        document.getElementById('btn-right').addEventListener('click', () => joinWithRole('right'));

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</head>
<body class="bg-black overflow-hidden font-sans select-none">
    <div id="menu-ui" class="fixed inset-0 flex items-center justify-center bg-gray-900 text-white z-50">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md mx-4">
            <h1 class="text-3xl font-bold mb-2 text-center text-indigo-400">BONELAB PHYSICS</h1>
            <p id="status-text" class="text-sm text-yellow-400 mb-6 text-center">Initializing...</p>
            <div class="mb-6 pb-6 border-b border-gray-700">
                <button id="btn-host" disabled class="role-btn w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-lg font-bold">Start PC Host</button>
            </div>
            <div>
                <input id="room-input" type="number" placeholder="Enter Code" class="w-full bg-gray-700 text-center text-xl py-3 rounded-lg mb-3">
                <div class="grid grid-cols-1 gap-2">
                    <button id="btn-headset" disabled class="role-btn w-full bg-emerald-600 py-3 rounded-lg font-bold">Connect Headset</button>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btn-left" disabled class="role-btn bg-red-600 py-3 rounded-lg font-bold">Left Hand</button>
                        <button id="btn-right" disabled class="role-btn bg-blue-600 py-3 rounded-lg font-bold">Right Hand</button>
                    </div>
                </div>
            </div>
            <div class="mt-4 text-center">
                <p class="text-xs text-gray-500 italic">WASD + Space on PC to navigate the sandbox</p>
            </div>
        </div>
    </div>
    <div id="host-ui" class="hidden fixed top-4 left-4 z-40 text-white">
        <div class="bg-black/60 p-4 rounded-xl border border-gray-700 backdrop-blur-sm">
            <h2 id="display-code" class="text-4xl font-mono font-bold text-indigo-400">----</h2>
            <div class="mt-2 text-xs text-gray-300 space-y-1">
                <p>• <b>WASD</b>: Move</p>
                <p>• <b>SPACE</b>: Jump</p>
                <p>• <b>Phone Gyro</b>: Rotate Head & Hands</p>
            </div>
        </div>
    </div>
    <div id="client-ui" class="hidden fixed inset-0 bg-black flex flex-col items-center justify-center text-white z-50">
        <h1 id="client-role-display" class="text-3xl font-bold text-emerald-500 mb-4 tracking-widest">STREAMING...</h1>
        <div class="w-24 h-24 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
</body>
</html>
